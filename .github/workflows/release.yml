name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Cheetah ${{ github.ref_name }}
          body: |
            ## Cheetah ${{ github.ref_name }}

            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Downloads
            - **Linux amd64**: `cheetah-linux-amd64`
            - **Linux arm64**: `cheetah-linux-arm64`
            - **macOS amd64**: `cheetah-darwin-amd64`
            - **macOS arm64 (Apple Silicon)**: `cheetah-darwin-arm64`
            - **Windows amd64**: `cheetah-windows-amd64.exe`

            ### Installation
            ```bash
            # Linux/macOS
            chmod +x cheetah-*
            sudo mv cheetah-* /usr/local/bin/cheetah

            # Or use Nix
            nix run github:timlinux/cheetah
            ```

            ---
            Made with ♥ by [Kartoza](https://kartoza.com)
          draft: false
          prerelease: false

  build:
    name: Build and Upload
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          go build -ldflags="-s -w" -o cheetah-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./cheetah-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          asset_name: cheetah-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          asset_content_type: application/octet-stream
