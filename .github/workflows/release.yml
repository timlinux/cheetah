name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate changelog
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi

          # Escape for GitHub Actions
          CHANGES="${CHANGES//'%'/'%25'}"
          CHANGES="${CHANGES//$'\n'/'%0A'}"
          CHANGES="${CHANGES//$'\r'/'%0D'}"

          echo "changes=$CHANGES" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: 🐆 Cheetah ${{ github.ref_name }}
          body: |
            ## 🐆 Cheetah ${{ github.ref_name }}

            **RSVP Speed Reading Application** - Read at speeds up to 1000+ WPM!

            ### ✨ What's New

            ${{ steps.release_notes.outputs.changes }}

            ### 📦 Downloads

            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | 🐧 Linux | x86_64 | `cheetah-linux-amd64` |
            | 🐧 Linux | ARM64 | `cheetah-linux-arm64` |
            | 🍎 macOS | Intel | `cheetah-darwin-amd64` |
            | 🍎 macOS | Apple Silicon | `cheetah-darwin-arm64` |
            | 🪟 Windows | x86_64 | `cheetah-windows-amd64.exe` |
            | 🪟 Windows | ARM64 | `cheetah-windows-arm64.exe` |

            ### 🚀 Quick Start

            ```bash
            # Linux/macOS - Download and install
            chmod +x cheetah-*
            sudo mv cheetah-* /usr/local/bin/cheetah

            # Run TUI mode
            cheetah ~/Documents/book.pdf

            # Run Web mode
            cheetah web -port 8787
            ```

            ### 📚 Features

            - **TUI Mode**: Beautiful terminal interface with block-letter word display
            - **Web Mode**: Browser-based interface with drag-drop document support
            - **Document Support**: PDF, DOCX, EPUB, ODT, TXT, Markdown
            - **Smart Pacing**: Punctuation-aware delays for natural reading
            - **Session Persistence**: Resume reading where you left off
            - **Interactive Scrubber**: Click/drag to jump anywhere in the document

            ### 🔗 Links

            - [Documentation](https://timlinux.github.io/cheetah/docs/)
            - [Source Code](https://github.com/timlinux/cheetah)
            - [Report Issues](https://github.com/timlinux/cheetah/issues)

            ---
            Made with ❤️ by [Kartoza](https://kartoza.com) | [Donate](https://github.com/sponsors/timlinux)
          draft: false
          prerelease: false

  build:
    name: Build and Upload
    needs: release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          go build -ldflags="-s -w" -o cheetah-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} .

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ./cheetah-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          asset_name: cheetah-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          asset_content_type: application/octet-stream
